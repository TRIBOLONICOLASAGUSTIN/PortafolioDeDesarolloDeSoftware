<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Formulario de Contacto</title>
  <link rel="stylesheet" href="Estilos2.CSS/Formulario.CSS">
</head>
<body>
  <main class="contacto-layout">
    <section>
      <form class="form" action="https://formspree.io/f/mykbbndv" method="POST">
        <div class="form__container">
          <h2 class="form__title">Contáctame</h2>

          <label class="form__label" for="name">Nombre Completo</label>
          <input id="name" type="text" class="form__input" placeholder="Tu nombre" name="name" required>

          <label class="form__label" for="email">Correo Electrónico</label>
          <input id="email" type="email" class="form__input" placeholder="tu@correo.com" name="email" required>

          <label class="form__label" for="message">Mensaje</label>
          <textarea id="message" class="form__input form__input--message" placeholder="Escribe tu mensaje aquí..." name="message" required></textarea>

          <button type="submit" class="form__cta">Enviar Mensaje</button>
        </div>
      </form>
    </section>

    <aside class="contacto-info-col">
      <h2 class="contacto-info__title">Información de Contacto</h2>
      <p class="contacto-info__text">Si prefieres, también puedes contactarme a través de los siguientes medios.</p>

      <div class="contacto-card">
        <div class="contacto-item">
          <span class="contacto-icono">☎</span>
          <div>
            <h3>Teléfono</h3>
            <p>+54 9 3564 123456</p>
          </div>
        </div>
        <a class="contacto-volver" href="Index.HTML">Volver al menú principal</a>
      </div>
    </aside>
  </main>
</body>
</html>
